name: QA Challenge Candidate

on:
  pull_request:
    paths:
      - 'cypress/tests/candidate/**'
      - 'cypress/tests/api/**'
      - 'cypress/support/**'

jobs:
  cypress-challenge:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - run: yarn install --frozen-lockfile

    - name: Build frontend
      run: yarn build
      env:
        BACKEND_PORT: 3001
        CI: false

    - name: Cypress install
      uses: cypress-io/github-action@v6
      with:
        runTests: false

    - name: Run Challenge Tests
      uses: cypress-io/github-action@v6
      with:
        start: yarn start:ci
        wait-on: 'http://127.0.0.1:3000'
        wait-on-timeout: 180
        spec: |
          cypress/tests/candidate/*.spec.ts
          cypress/tests/api/*.spec.ts
        browser: chrome
        headed: false
      env:
        BACKEND_PORT: 3001

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cypress-results
        path: |
          cypress/videos
          cypress/screenshots
